<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get in touch — Acme</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Newsreader:ital@0;1&display=swap');

  :root {
    --ink: #1c1a17;
    --paper: #f4f0e8;
    --card: #fbf9f4;
    --line: #ddd5c7;
    --accent: #b8492f;
    --muted: #6f675a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, #efe7d6 0%, transparent 60%),
      var(--paper);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
    display: grid;
    place-items: center;
    padding: 40px 20px;
  }
  .wrap { width: 100%; max-width: 520px; }

  .config {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px;
    background: #2a2722;
    color: #e8e1d2;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 28px;
  }
  .config label { display:block; color:#b6ad9b; margin-bottom: 6px; letter-spacing:.04em; text-transform: uppercase; }
  .config input {
    width: 100%; background: #1b1814; border: 1px solid #3a352d;
    color: #f0eadc; border-radius: 7px; padding: 9px 10px; font: inherit; font-size: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 24px 60px -32px rgba(40,30,15,.45);
  }
  .eyebrow {
    font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 10px;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px;
    line-height: 1.05; margin: 0 0 8px; letter-spacing: -.01em;
  }
  .sub { color: var(--muted); font-size: 16px; margin: 0 0 28px; font-style: italic; }

  .field { margin-bottom: 18px; }
  .field label {
    display:block; font-family: ui-monospace, monospace; font-size: 11px;
    letter-spacing:.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
  }
  .field input, .field textarea {
    width: 100%; padding: 12px 14px; font: inherit; font-size: 15px;
    background: #fff; border: 1px solid var(--line); border-radius: 9px; color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,73,47,.14);
  }
  textarea { resize: vertical; min-height: 84px; }

  button {
    width: 100%; margin-top: 8px; padding: 14px; font: inherit; font-size: 15px;
    font-family: 'Fraunces', serif; font-weight: 600; letter-spacing:.01em;
    background: var(--ink); color: var(--paper); border: 0; border-radius: 10px;
    cursor: pointer; transition: transform .08s, background .15s;
  }
  button:hover { background: #322d26; }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .6; cursor: progress; }

  .note { margin-top: 16px; font-size: 14px; min-height: 20px; }
  .note.ok { color: #2f6d3b; }
  .note.err { color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="config">
      <label for="hook">n8n production webhook URL (demo only)</label>
      <input id="hook" placeholder="https://n8n.yourdomain.dev/webhook/lead-intake">
    </div>

    <div class="card">
      <p class="eyebrow">Acme · Sales</p>
      <h1>Let's talk.</h1>
      <p class="sub">Tell us a little about you and we'll be in touch shortly.</p>

      <div class="field">
        <label for="name">Full name</label>
        <input id="name" value="Jane Doe">
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input id="email" type="email" value="jane@stripe.com">
      </div>
      <div class="field">
        <label for="company">Company</label>
        <input id="company" value="Stripe">
      </div>
      <div class="field">
        <label for="message">What can we help with?</label>
        <textarea id="message">Interested in a demo for our sales team.</textarea>
      </div>

      <button id="send">Send message</button>
      <div class="note" id="note"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  $('send').addEventListener('click', async () => {
    const hook = $('hook').value.trim();
    const note = $('note');
    if (!hook) { note.className = 'note err'; note.textContent = 'Paste your n8n webhook URL above first.'; return; }

    const payload = {
      name: $('name').value,
      email: $('email').value,
      company: $('company').value,
      message: $('message').value
    };

    $('send').disabled = true;
    note.className = 'note'; note.textContent = 'Sending…';
    try {
      const res = await fetch(hook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      note.className = 'note ok';
      note.textContent = '✓ Sent! Check your Filament dashboard and inbox.';
    } catch (e) {
      note.className = 'note err';
      note.textContent = 'Failed: ' + e.message + ' — if this is a CORS error, set the webhook node\'s "Allowed Origins (CORS)" to *.';
    } finally {
      $('send').disabled = false;
    }
  });
</script>
</body>
</html>
